name: Update GitHub Readme Stats
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Fetch GitHub README Stats SVGs
        run: |
          mkdir -p assets
          curl -sS 'https://github-readme-stats.vercel.app/api?username=pablosdias2&show_icons=true&theme=dracula' -o assets/github-stats.svg || true
          curl -sS 'https://github-readme-stats.vercel.app/api/top-langs/?username=pablosdias2&layout=compact&theme=dracula' -o assets/top-langs.svg || true
      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg README.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update GitHub stats SVGs"
          git push